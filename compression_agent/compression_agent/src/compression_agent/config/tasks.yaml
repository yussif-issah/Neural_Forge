identify_mlp_layers_task:
  description: >
    This task involves analyzing a given model architecture to identify all the MLP (Multi-Layer Perceptron) layers present in it. 
    For each identified MLP layer, provide insights on its structure, such as the number of layers.
     The goal is to help optimize the model's performance and efficiency by understanding the role of MLP layers in the overall architecture.
  expected_output: >
    A list of all the MLP layers in the given model architecture. 
    {'mlp_layers': [{'layer_name': 'layer1', 'num_layers': 3}, {'layer_name': 'layer2', 'num_layers': 2}]}
  agent: model_architect_expert


